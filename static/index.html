<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurboQwenRAG - Your Local RAG Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="app-name">TurboQwenRAG</div>
        <div class="app-tag">Local Document Intelligence</div>
      </div>

      <div class="sidebar-scroll">
        <div class="sec-label">Documents</div>
        <ul class="doc-list" id="docList"></ul>
      </div>
    </aside>

    <main class="main">

      <header class="header">
        <div class="tabs">
          <button class="tab on" data-v="chat">Chat</button>
          <button class="tab" data-v="eval">Evaluate</button>
        </div>
        <button class="clear-btn" id="clearBtn">Clear</button>
      </header>

      <div class="view" id="chatView">
        <div class="messages" id="messages">
          <div class="empty" id="emptyState">
            <div class="empty-ico">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
              </svg>
            </div>
            <div class="empty-title">Ask your documents anything</div>
            <div class="empty-desc">Upload a PDF, TXT, or Markdown file using the attach button below.</div>
          </div>
        </div>

        <div class="input-area">
          <input type="file" id="fileInput" multiple accept=".pdf,.txt,.md" style="display:none">
          <div class="input-wrap">
            <button class="attach-btn" id="attachBtn" title="Upload documents">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.42 16.41a2 2 0 0 1-2.83-2.83l8.49-8.48" />
              </svg>
            </button>
            <textarea id="msgInput" rows="1" placeholder="Message TurboQwenRAG…"></textarea>
            <button class="send-btn" id="sendBtn" disabled>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5" />
                <polyline points="5 12 12 5 19 12" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="view off" id="evalView">
        <div class="eval-scroll">
          <div class="eval-grid">

            <div class="eval-card">
              <div class="field-label">Question</div>
              <textarea id="evalQ" rows="3" placeholder="Enter the question asked…"></textarea>
            </div>

            <div class="eval-card">
              <div class="field-label">Answer</div>
              <textarea id="evalA" rows="3" placeholder="Enter the AI answer to evaluate…"></textarea>
            </div>

            <div class="eval-card wide">
              <div class="field-label">
                Context <span>optional · separate passages with</span>
              </div>
              <textarea id="evalCtx" rows="4"
                placeholder="Leave blank to auto-retrieve from the current index…"></textarea>
            </div>

            <div class="eval-card wide">
              <button class="run-btn" id="evalBtn">Run Evaluation</button>
            </div>

            <div class="eval-card wide" id="evalResultCard" style="display:none">
              <div class="field-label">Results</div>
              <div class="metrics-grid" id="metricsGrid"></div>
            </div>

          </div>
        </div>
      </div>

    </main>
  </div>

  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-inner">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      <div class="drop-inner-title">Drop files to upload</div>
      <div class="drop-inner-sub">PDF · TXT · Markdown</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>

</html>
